<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>해밀홈즈 · 신길역 원룸 문의</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;
    background:linear-gradient(180deg,#FFF7EF 0%,#FBF7F3 40%,#FFFFFF 100%);
    min-height:100vh; display:flex; justify-content:center;
    padding:38px 20px 48px; color:#2B2B2E;
  }
  .wrap { width:100%; max-width:430px; text-align:center; }
  .logo { width:118px; height:118px; border-radius:50%; object-fit:cover;
           box-shadow:0 8px 24px rgba(222,112,26,.18); margin-bottom:18px; }
  h1 { font-size:27px; font-weight:800; letter-spacing:-.5px; }
  .sub { margin-top:8px; font-size:15px; color:#8A7E74; line-height:1.5; }
  .badge { display:inline-block; margin-top:14px; padding:7px 16px; border-radius:999px;
            background:#F1E7FA; color:#6B3F9E; font-size:13px; font-weight:700; }
  .btns { margin-top:30px; display:flex; flex-direction:column; gap:14px; }
  a.btn { display:flex; align-items:center; gap:14px; text-decoration:none;
           padding:18px 22px; border-radius:18px; font-size:18px; font-weight:800;
           box-shadow:0 4px 14px rgba(0,0,0,.07); transition:transform .06s ease; }
  a.btn:active { transform:scale(.98); }
  .ic { width:30px; font-size:24px; text-align:center; flex-shrink:0; }
  .txt { text-align:left; line-height:1.25; }
  .txt small { display:block; font-size:12px; font-weight:600; opacity:.7; margin-top:2px; }
  .kakao { background:#FEE500; color:#3A1D1D; }
  .sms   { background:#DE701A; color:#fff; }
  .tel   { background:#ffffff; color:#2B2B2E; border:2px solid #E7DFD7; box-shadow:none; }
  .insta { background:linear-gradient(45deg,#F58529,#DD2A7B,#8134AF); color:#fff; }
  .foot { margin-top:30px; font-size:12.5px; color:#A89E94; line-height:1.6; }
  .hint { margin-top:22px; font-size:13px; color:#B0A498; }
</style>
